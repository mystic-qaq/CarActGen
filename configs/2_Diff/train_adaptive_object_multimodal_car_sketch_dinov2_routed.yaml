seed: 123456798
wandb:
  use: false
  project: Adaptive_Object_Multimodal_Diff_Car_Sketch_DINOv2_Routed
  entity: null

default_root_dir: outputs/routed_diffusion
num_epochs: 8000

dataset_n_dataloader:
  n_workers: 4
  batch_size: 8
  cache: true
  val_ratio: 0.10
  test_ratio: 0.10
  fixed_test_ids:
    - car_drivaer_305
  split_path: splits/object_sketch_dinov2_routed_seed123456798.json
  dataset_path: outputs/datasets/2.1_adaptive_multimodal_latentcode_sketch_dinov2

checkpoint:
  path: outputs/routed_diffusion/checkpoint
  freq: 100
  save_top_k: 5
  save_last: true
  save_on_train_epoch_end: true

function_aware:
  vocab:
    - static_root
    - static_part
    - rotating_support
    - rotating_part
    - hinged_panel
    - sliding_part
    - handle
    - support
  diffusion_loss_weight_by_branch:
    text:
      rotating_support: 1.55
      rotating_part: 1.25
    image:
      static_root: 1.60
      static_part: 1.20
    text_image:
      static_root: 1.25
      rotating_support: 1.25

model:
  architecture: routed_object
  latent_dim: 768
  max_parts: 16
  hidden_dim: 512
  condition_hidden_dim: 768
  time_dim: 256
  depth: 5
  expert_depth: 2
  fusion_depth: 2
  n_heads: 8
  ffn_dim: 2048
  dropout: 0.1
  output_film_scale: 0.08
  text_dim: 1024
  text_shape: [16, 1024]
  image_dim: 768
  image_shape: [32, 768]

diffusion:
  timesteps: 1000
  objective: pred_noise

branch_loss:
  unconditional_weight: 0.15
  text_weight: 0.85
  image_weight: 0.85
  text_image_weight: 0.35
  agreement_weight: 0.05

lr: 2.0e-4
weight_decay: 1.0e-4

latent_normalization:
  stats_path: null

evaluation:
  sdf_model_path: null
  max_batch: 32768
  resolution: 128
  count: 8
  freq_epoch: 20
